<body>

  <!-- NAV -->
  <nav class="nav">
    <a class="nav__logo" href="index.html">
      <img src="Images/NavBarMahjongTempLogo.png" alt="Mahjong Social at Solara">
    </a>
    <ul class="nav__links">
      <li><a href="booking.html">Booking</a></li>
      <li><a href="location.html">Location</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" aria-current="page">Contact</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <span class="page-header__eyebrow">Get In Touch</span>
    <h1>Contact Us</h1>
    <p class="page-header__sub">Have a question or want to book a session? We'd love to hear from you.</p>
  </header>

  <!-- CONTACT FORM SECTION -->
  <section class="contact">
    <div class="contact__inner">
      <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="90a331ab-8699-4917-b7d0-d5abfcab064c">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required placeholder="What's on your mind?"></textarea>
        </div>

        <button type="submit" class="btn btn--gold">Send Message</button>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p class="footer__logo">Mahjong Social at Solara</p>
    <p class="footer__tagline"><em>Play beautifully.</em></p>
