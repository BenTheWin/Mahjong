<body>

  <!-- NAV -->
  <script src="components/nav.js"></script>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <span class="page-header__eyebrow">Get In Touch</span>
    <h1>Contact Us</h1>
    <p class="page-header__sub">Have a question or want to book a private session? We'd love to hear from you.</p>
  </header>

  <!-- CONTACT FORM SECTION -->
  <section class="contact">
    <div class="contact__inner">
      <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="90a331ab-8699-4917-b7d0-d5abfcab064c">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required placeholder="What's on your mind?"></textarea>
        </div>

        <button type="submit" class="btn btn--gold">Send Message</button>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <script src="components/mobile-menu.js"></script>
  <script src="components/footer.js"></script>

</body>
</html>
