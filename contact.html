<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Mahjong Social at Solara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a class="nav__logo" href="index.html">
      <img src="Images/NavBarMahjongTempLogo.png" alt="Mahjong Social at Solara">
    </a>
    <ul class="nav__links">
      <li><a href="booking.html">Booking</a></li>
      <li><a href="location.html">Location</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" aria-current="page">Contact</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <span class="page-header__eyebrow">Get In Touch</span>
    <h1>Contact Us</h1>
    <p class="page-header__sub">Have a question or want to book a session? We'd love to hear from you.</p>
  </div>

  <!-- CONTACT FORM SECTION -->
  <section class="contact">
    <div class="contact__inner">
      <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="5138157a-83bb-48d4-b222-310ee2239f10">
        <input type="hidden" name="subject" value="New message from Mahjong Social website">
        <input type="hidden" name="redirect" value="contact-thanks.html">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required placeholder="What's on your mind?"></textarea>
        </div>

        <button type="submit" class="btn btn--gold">Send Message</button>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p class="footer__logo">Mahjong Social at Solara</p>
    <p class="footer__tagline"><em>Play beautifully.</em></p>
    <nav class="footer__links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="booking.html">Booking</a>
      <a href="location.html">Location</a>
      <a href="contact.html">Contact</a>
    </nav>
    <p class="footer__copy">&copy; 2026 Mahjong Social at Solara. All rights reserved.</p>
  </footer>

</body>
</html>
